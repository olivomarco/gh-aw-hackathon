<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d1117"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="64" height="64" rx="12" fill="#7c3aed"/>
  <text x="91" y="129" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="32" font-weight="700" fill="white">aw</text>
  <circle cx="134" cy="90" r="7" fill="#a78bfa" opacity="0.9"/>
  <path d="M132 88 L134 83 L136 88" stroke="#e9d5ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Site title -->
  <text x="160" y="125" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="28" font-weight="700" fill="#e6edf3">gh-aw Hackathon</text>

  <!-- Main headline -->
  <text x="80" y="310" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#e6edf3" letter-spacing="-2">Build AI workflows</text>
  <text x="80" y="400" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">
    <tspan fill="#a78bfa">that move at the speed</tspan>
  </text>
  <text x="80" y="490" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">
    <tspan fill="#a78bfa">of thought.</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="560" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif" font-size="24" fill="#8b949e">A What The Hack event · Three tracks · Hands-on challenges</text>

  <!-- Decorative track pills -->
  <rect x="910" y="280" width="200" height="36" rx="18" fill="rgba(124,58,237,0.2)" stroke="#7c3aed" stroke-width="1"/>
  <text x="1010" y="303" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="600" fill="#a78bfa">AI Workflows</text>

  <rect x="910" y="328" width="200" height="36" rx="18" fill="rgba(46,160,67,0.2)" stroke="#2ea043" stroke-width="1"/>
  <text x="1010" y="351" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="600" fill="#56d364">Safe Outputs</text>

  <rect x="910" y="376" width="200" height="36" rx="18" fill="rgba(31,142,196,0.2)" stroke="#1f8ec4" stroke-width="1"/>
  <text x="1010" y="399" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="600" fill="#58a6ff">MCP Integration</text>
</svg>
