<header class="site-header" role="banner">
  <div class="container site-header__inner">

    <a href="{{ '/' | relative_url }}" class="site-header__logo" aria-label="{{ site.title }} home">
      <svg class="site-header__logo-mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect width="32" height="32" rx="6" fill="#7c3aed"/>
        <text x="5" y="23" font-family="ui-monospace,SFMono-Regular,monospace" font-size="16" font-weight="700" fill="white">aw</text>
      </svg>
      <span class="site-header__logo-text">{{ site.title }}</span>
    </a>

    <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Toggle navigation">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" class="nav-toggle__icon nav-toggle__icon--open">
        <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" class="nav-toggle__icon nav-toggle__icon--close" style="display:none">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>

    <nav class="site-nav" id="site-nav" aria-label="Main navigation">
      <ul class="site-nav__list" role="list">
        <li><a href="{{ '/challenges' | relative_url }}" class="site-nav__link{% if page.url contains '/challenges' %} site-nav__link--active{% endif %}">Challenges</a></li>
        <li><a href="{{ '/#tracks' | relative_url }}" class="site-nav__link">Tracks</a></li>
        <li><a href="{{ '/docs/getting-started/devcontainer-setup' | relative_url }}" class="site-nav__link">Get started</a></li>
      </ul>
    </nav>

    <div class="site-header__actions">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark theme" title="Toggle theme">
        <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display:none">
          <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>

      <a href="https://github.com" class="btn btn--sm btn--ghost site-header__github" aria-label="View on GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor" class="btn__icon" aria-hidden="true"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
        GitHub
      </a>
    </div>

  </div>
</header>
